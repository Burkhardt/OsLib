.3983 L1494.58,788.3983 L1529.27,792.3983 L1529.27,824.0205 A0,0 0 0 0 1529.27,824.0205 L1847.0483,824.0205 A0,0 0 0 0 1847.0483,824.0205 L1847.0483,762.7783 L1837.0483,752.7783 L1529.27,752.7783 A0,0 0 0 0 1529.27,752.7783" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1837.0483,752.7783 L1837.0483,762.7783 L1847.0483,762.7783 L1837.0483,752.7783" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="175.6079" x="1535.27" y="770.3466">Tree-by-ItemId convention:</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="277.6846" x="1535.27" y="785.6572">path segments derived from ItemId prefixes</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="194.7651" x="1535.27" y="800.9677">(Topdir: first 3, Subdir: first 6).</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="296.7783" x="1535.27" y="816.2783">Convention is enforced via ItemId/Path setters.</text></g><g class="entity" data-qualified-name="GMN24" data-source-line="150" id="ent0025"><path d="M554.71,768.0883 L554.71,808.7094 L875.605,808.7094 L875.605,778.0883 L865.605,768.0883 L554.71,768.0883" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M865.605,768.0883 L865.605,778.0883 L875.605,778.0883 L865.605,768.0883" fill="#FEFFDD" style="stroke:#181818;stroke-width:1;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="299.895" x="560.71" y="785.6566">Reusable typed JSON config file built on RaiFile.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="290.3354" x="560.71" y="800.9672">OsLib uses it for Os.Config and osconfig.json.</text></g><!--link OsConfigFile to GMN24--><g class="link" data-entity-1="ent0011" data-entity-2="ent0025" data-